<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSBF Temizlik Kontrol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="page-login" class="page active">
    <div class="login-bg">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v12M3 6l7 4 7-4" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </div>
          <span class="brand-name">GSBF</span>
        </div>
        <h1 class="login-title">Giriş yap</h1>
        <p class="login-sub">Temizlik kontrol sistemine hoş geldiniz</p>
        <div class="field-group">
          <label class="field-label">E-posta</label>
          <input type="email" id="login-email" class="field-input" placeholder="ornek@gsbf.edu.tr" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label">Şifre</label>
          <input type="password" id="login-password" class="field-input" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div id="login-error" class="login-error" style="display:none"></div>
        <button id="login-btn" class="btn-primary full" onclick="doLogin()">Giriş Yap</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="page-app" class="page">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <div class="brand-icon sm">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v12M3 6l7 4 7-4" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </div>
          <span>GSBF Temizlik</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-page="form">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h6M7 7h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Kontrol Formu
          </a>
          <a href="#" class="nav-item" data-page="kayitlar">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h12M4 14h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Kayıtlar
          </a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <div class="user-row">
          <div class="user-avatar-sm" id="user-initials"></div>
          <span class="user-email-sm" id="user-email-display"></span>
          <button class="logout-btn" onclick="doLogout()" title="Çıkış">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M13 15l4-5-4-5M17 10H7M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">

      <!-- FORM VIEW -->
      <div id="view-form" class="view active">
        <div class="view-header">
          <div>
            <h2 class="view-title">Kontrol Formu</h2>
            <p class="view-sub">Kontrol sonrası alanın durumunu işaretleyiniz</p>
          </div>
        </div>
        <div class="form-body">
          <div class="form-grid">

            <div class="form-card">
              <label class="card-label">Sorumlu Personel <span class="req">*</span></label>
              <select id="f-personel" class="field-input">
                <option value="">Seçiniz</option>
                <option>Sevim KADERCİ</option>
                <option>Ali YILMAZ</option>
                <option>Fatma ÖZ</option>
                <option>Mehmet KAYA</option>
              </select>
            </div>

            <div class="form-card">
              <label class="card-label">Kontrol Edilen Alan <span class="req">*</span></label>
              <select id="f-alan" class="field-input">
                <option value="">Seçiniz</option>
                <option>A Blok Giriş Kat</option>
                <option>A Blok 1. Kat</option>
                <option>A Blok 2. Kat</option>
                <option>B Blok Giriş Kat</option>
                <option>B Blok 1. Kat</option>
                <option>B Blok 2. Kat</option>
                <option>Kantin</option>
                <option>Tuvaletler</option>
              </select>
            </div>

            <div class="form-card">
              <label class="card-label">Kontrol Türü</label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="kontrol_turu" value="1. KONTROL (İlk Denetim)" checked>
                  <span>1. Kontrol — İlk Denetim</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="kontrol_turu" value="2. KONTROL (Eksik Sonrası Tekrar Denetim)">
                  <span>2. Kontrol — Eksik Sonrası Tekrar</span>
                </label>
              </div>
            </div>

            <div class="form-card">
              <label class="card-label">Alan Durumu <span class="req">*</span></label>
              <div class="status-toggle">
                <label class="status-opt uygun">
                  <input type="radio" name="alan_durumu" value="UYGUN" checked>
                  <span>
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><polyline points="4,10 8,14 16,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Uygun
                  </span>
                </label>
                <label class="status-opt eksik">
                  <input type="radio" name="alan_durumu" value="EKSİK">
                  <span>
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><line x1="5" y1="5" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="5" x2="5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Eksik
                  </span>
                </label>
              </div>
            </div>

            <div class="form-card">
              <label class="card-label">Kontrol Eden <span class="req">*</span></label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="kontrol_eden" value="Aydan AYAZ" checked>
                  <span>Aydan AYAZ</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="kontrol_eden" value="Yunus AKBAŞ">
                  <span>Yunus AKBAŞ</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="kontrol_eden" value="Şenay TANRIÖVER">
                  <span>Şenay TANRIÖVER</span>
                </label>
              </div>
            </div>

            <div class="form-card full">
              <label class="card-label">Kontrol Görseli <span class="req">*</span></label>
              <p class="upload-hint">En fazla 5 görsel, her biri 10 MB altında</p>
              <label class="upload-zone" for="f-gorsel">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                <span>Dosya seç veya sürükle bırak</span>
              </label>
              <input type="file" id="f-gorsel" accept="image/*" multiple style="display:none" onchange="handleFiles(this)">
              <div id="file-preview" class="file-preview"></div>
            </div>

          </div>

          <div class="form-actions">
            <button class="btn-ghost" onclick="clearForm()">Temizle</button>
            <button class="btn-primary" id="submit-btn" onclick="submitForm()">Formu Gönder</button>
          </div>
        </div>
      </div>

      <!-- KAYITLAR VIEW -->
      <div id="view-kayitlar" class="view">
        <div class="view-header">
          <div>
            <h2 class="view-title">Kayıtlar</h2>
            <p class="view-sub">Tüm kontrol geçmişi</p>
          </div>
          <div class="header-filters">
            <input type="text" class="search-input" placeholder="Ara..." oninput="filterRecords()" id="search-input">
            <select class="filter-select" id="filter-durum" onchange="filterRecords()">
              <option value="">Tüm durumlar</option>
              <option value="UYGUN">Uygun</option>
              <option value="EKSİK">Eksik</option>
            </select>
          </div>
        </div>
        <div id="records-list" class="records-list">
          <div class="empty-state">Yükleniyor...</div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
